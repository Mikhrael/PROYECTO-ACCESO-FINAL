<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso VIP Canteras | Elegancia y Seguridad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- ESTILOS BASE LUXURY (NEGRO & ORO) --- */
        :root {
            --bg-dark: #121212;
            --bg-gold-metal: #a68b55;
            --text-gold-light: #f4d081;
            --text-gold-dark: #8c7340;
            --gold-gradient: linear-gradient(135deg, #f4d081 0%, #c29d50 50%, #8c7340 100%);
            --shadow-metal-raised: 8px 8px 16px rgba(0,0,0,0.6), -8px -8px 16px rgba(255,255,255,0.05);
            --shadow-metal-in: inset 3px 3px 6px rgba(0,0,0,0.4), inset -3px -3px 6px rgba(255,255,255,0.05);
            --shadow-gold-text: 1px 1px 3px rgba(0,0,0,0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .luxury-card {
            background-color: var(--bg-gold-metal);
            background-image: var(--gold-gradient);
            width: 100%;
            max-width: 400px;
            border-radius: 40px;
            box-shadow: var(--shadow-metal-raised);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .header-section {
            background-color: var(--bg-dark);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            padding: 50px 30px;
            text-align: center;
            border-bottom: 2px solid var(--text-gold-dark);
        }

        .header-logo {
            color: var(--text-gold-light);
            font-size: 70px;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 5px rgba(244, 208, 129, 0.4));
        }

        .title-gold-raised {
            color: var(--text-gold-light);
            font-weight: 700;
            font-size: 26px;
            text-shadow: var(--shadow-gold-text);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .subtitle-gold-soft {
            color: var(--text-gold-dark);
            font-weight: 400;
            font-size: 16px;
            text-shadow: var(--shadow-gold-text);
            opacity: 0.9;
        }

        .form-section {
            padding: 40px 30px;
        }

        .pills-container {
            display: flex;
            background-color: rgba(0,0,0,0.1);
            box-shadow: var(--shadow-metal-in);
            border-radius: 20px;
            padding: 5px;
            margin-bottom: 30px;
        }

        .pill-button {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-gold-dark);
            padding: 15px;
            font-weight: 600;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
        }

        .pill-button.active {
            color: var(--text-gold-light);
            background-color: rgba(0,0,0,0.7);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            border: 1px solid var(--text-gold-dark);
        }

        .form-label {
            display: block;
            text-align: left;
            color: var(--text-gold-dark);
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 10px;
            padding-left: 15px;
            text-shadow: 1px 1px 1px rgba(255,255,255,0.1);
        }

        .luxury-input {
            width: 100%;
            background-color: transparent;
            border: 1px solid var(--text-gold-dark);
            padding: 18px;
            border-radius: 18px;
            box-shadow: var(--shadow-metal-in);
            color: var(--text-gold-light);
            font-size: 16px;
            margin-bottom: 25px;
            font-family: inherit;
        }

        .luxury-input::placeholder {
            color: rgba(244, 208, 129, 0.5);
        }

        .btn-luxury {
            width: 100%;
            background-color: #000000;
            border: 2px solid var(--text-gold-dark);
            color: var(--text-gold-light);
            padding: 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
            margin-top: 15px;
            box-shadow: var(--shadow-metal-raised);
        }

        .btn-luxury:active {
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.6);
            transform: translateY(1px);
        }

        #resultado {
            margin-top: 35px;
            border-top: 2px solid var(--text-gold-dark);
            padding-top: 25px;
            text-align: center;
        }

        .qr-frame {
            display: inline-block;
            background-color: white;
            padding: 20px;
            border-radius: 25px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        #qr-msg {
            color: var(--text-gold-light);
            font-weight: 600;
            margin-bottom: 20px;
            text-shadow: var(--shadow-gold-text);
        }

        /* Contenedor para los botones de acción final */
        .actions-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-secondary-luxury {
            background-color: transparent;
            border: 2px solid var(--text-gold-dark);
            color: var(--text-gold-light);
            padding: 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            flex: 1;
            min-width: 140px;
            transition: all 0.3s ease;
        }

        .btn-secondary-luxury:hover {
            background-color: rgba(0,0,0,0.3);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<div class="luxury-card">
    <div class="header-section">
        <div class="header-logo">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h1 class="title-gold-raised">Residencial Canteras</h1>
        <p class="subtitle-gold-soft">Sistema de Acceso Inteligente</p>
    </div>

    <div class="form-section">
        <div class="pills-container">
            <button class="pill-button active" onclick="switchTab('invitado')">
                <i class="fa-solid fa-user-clock"></i> Pase Invitado
            </button>
            <button class="pill-button" onclick="switchTab('admin')">
                <i class="fa-solid fa-user-shield"></i> Administrador
            </button>
        </div>

        <div class="tab-content active" id="tab-invitado">
            <label class="form-label">Identificación del Pase</label>
            <input type="text" id="casaV" class="luxury-input" placeholder="Nombre del QR (Ej: Visita 405)">
            <button onclick="generar(false)" class="btn-luxury">Generar Pase (2 Usos)</button>
        </div>

        <div class="tab-content" id="tab-admin">
            <label class="form-label">Identificación / Casa</label>
            <input type="text" id="casaA" class="luxury-input" placeholder="Ej: Administrador">
            <label class="form-label">Cantidad de Usos</label>
            <input type="number" id="usosA" class="luxury-input" value="1">
            <label class="form-label">Tipo de Acceso</label>
            <select id="tipoA" class="luxury-input" style="background-color: #121212; color: #f4d081;">
                <option value="Permanente">Residente (Permanente)</option>
                <option value="Temporal">Temporal (Multi-uso)</option>
            </select>
            <label class="form-label">PIN de Seguridad</label>
            <input type="password" id="pinA" class="luxury-input" placeholder="****">
            <button onclick="generar(true)" class="btn-luxury">Generar Maestro</button>
        </div>

        <div id="resultado" style="display: none;">
            <div class="qr-frame">
                <div id="qr-img"></div>
            </div>
            <p id="qr-msg"></p>
            
            <div class="actions-container">
                <button onclick="window.print()" class="btn-luxury" style="margin-top: 0; padding: 15px; font-size: 14px; flex: 1;">
                    <i class="fa-solid fa-print"></i> Imprimir
                </button>
                <button onclick="nuevaVisita()" class="btn-secondary-luxury">
                    <i class="fa-solid fa-plus-circle"></i> Nueva Visita
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    function switchTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.pill-button').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${tabName}`).classList.add('active');
        event.currentTarget.classList.add('active');
        document.getElementById('resultado').style.display = 'none';
    }

    // FUNCIÓN PARA LIMPIAR TODO Y REGRESAR AL INICIO
    function nuevaVisita() {
        document.getElementById('resultado').style.display = 'none';
        document.getElementById('casaV').value = '';
        document.getElementById('casaA').value = '';
        document.getElementById('pinA').value = '';
        document.getElementById('usosA').value = '1';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function generar(isAdmin) {
        const casa = isAdmin ? document.getElementById('casaA').value : document.getElementById('casaV').value;
        const tipo = isAdmin ? document.getElementById('tipoA').value : "Temporal";
        const usos = isAdmin ? document.getElementById('usosA').value : 2;
        const pin = isAdmin ? document.getElementById('pinA').value : "";

        if(!casa) return alert("Por favor, ingresa una identificación para el QR.");
        
        const resDiv = document.getElementById('resultado');
        const imgDiv = document.getElementById('qr-img');
        const msg = document.getElementById('qr-msg');

        resDiv.style.display = 'block';
        imgDiv.innerHTML = '<div style="color:#f4d081; font-weight:600;">Cifrando pase...</div>';

        let url = `/generar?casa=${encodeURIComponent(casa)}&tipo=${tipo}&usos=${usos}`;
        if(pin) url += `&pin=${pin}`;

        const img = new Image();
        img.src = url;
        img.style.maxWidth = "200px";
        img.onload = () => {
            imgDiv.innerHTML = "";
            imgDiv.appendChild(img);
            msg.innerText = isAdmin ? "Pase Maestro Generado" : "Pase de Invitado (2 Usos) Generado";
            // Scroll automático para ver el QR generado
            resDiv.scrollIntoView({ behavior: 'smooth' });
        };
        img.onerror = () => {
            imgDiv.innerHTML = '<p style="color:#ff4444; font-size:12px; font-weight:600;">Error: PIN incorrecto o problema de red.</p>';
            msg.innerText = "";
        };
    }
</script>
</body>
</html>
