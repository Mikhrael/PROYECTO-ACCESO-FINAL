<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Residencial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; margin-top: 50px; }
        #qr-container img { max-width: 100%; border: 5px solid white; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="card shadow p-4 mx-auto" style="max-width: 400px;">
            <h2 class="mb-4">Generar Pase</h2>
            <p class="text-muted">Ingresa el número de tu casa</p>
            
            <input type="text" id="casaInput" class="form-control form-control-lg mb-3 text-center" placeholder="Ej: 48">
            
            <button onclick="pedirQR()" class="btn btn-primary btn-lg w-100">
                Crear Código QR
            </button>

            <div id="qr-container" class="mt-4">
                </div>
        </div>
    </div>

    <script>
        async function pedirQR() {
    const casa = document.getElementById('casaInput').value;
    if (!casa) return alert("Por favor, escribe el número de casa");

    const container = document.getElementById('qr-container');
    container.innerHTML = '<div class="spinner-border text-primary" role="status"></div>';

    // El cambio importante es asegurar que use la ruta /generar/
    container.innerHTML = `<img src="/generar/${casa}" class="img-fluid shadow-sm" alt="Código QR">
                           <p class="mt-2 fw-bold text-success">¡Pase generado para Casa ${casa}!</p>`;
}
    </script>
</body>
</html>
