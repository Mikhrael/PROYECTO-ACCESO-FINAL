<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Canteras | Lujo y Seguridad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- ESTILOS NEUMÓRFICOS BASE --- */
        :root {
            --bg-color: #e0e5ec; /* Fondo gris muy claro, clave para el efecto */
            --text-color: #37474f;
            --gold-color: #d4af37; /* Tono dorado elegante */
            --gold-gradient: linear-gradient(145deg, #f0d58a, #c19b2a); /* Degradado dorado */
            
            /* Sombras clave para el Neumorfismo */
            --shadow-out: 6px 6px 12px #a3b1c6, -6px -6px 12px #ffffff;
            --shadow-in: inset 3px 3px 6px #a3b1c6, inset -3px -3px 6px #ffffff;
            --shadow-gold-text: 1px 1px 2px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-vh-100;
            padding: 20px;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .neumorphic-card {
            background-color: var(--bg-color);
            width: 100%;
            max-width: 400px;
            border-radius: 30px;
            box-shadow: var(--shadow-out);
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* --- LOGO Y TÍTULOS ORO --- */
        .header-logo {
            color: var(--gold-color);
            font-size: 60px;
            margin-bottom: 20px;
            text-shadow: var(--shadow-gold-text);
        }

        .title-gold {
            color: var(--gold-color);
            font-weight: 700;
            font-size: 24px;
            text-shadow: var(--shadow-gold-text);
            margin-bottom: 5px;
        }

        .subtitle-gold {
            color: var(--gold-color);
            font-weight: 400;
            font-size: 16px;
            opacity: 0.9;
            text-shadow: var(--shadow-gold-text);
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 15px;
        }

        /* --- PESTAÑAS (Invitado / Dueño) --- */
        .pills-container {
            display: flex;
            background-color: var(--bg-color);
            box-shadow: var(--shadow-in);
            border-radius: 15px;
            padding: 5px;
            margin-bottom: 25px;
        }

        .pill-button {
            flex: 1;
            background: none;
            border: none;
            color: #78909c;
            padding: 12px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .pill-button.active {
            color: var(--gold-color);
            background-color: var(--bg-color);
            box-shadow: var(--shadow-out);
        }

        /* --- FORMULARIO 'HUNDIDO' --- */
        .form-label {
            display: block;
            text-align: left;
            color: var(--gold-color);
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            padding-left: 15px;
            text-shadow: var(--shadow-gold-text);
        }

        .neumorphic-input {
            width: 100%;
            background-color: var(--bg-color);
            border: none;
            padding: 15px;
            border-radius: 15px;
            box-shadow: var(--shadow-in);
            color: var(--gold-color);
            font-size: 16px;
            margin-bottom: 20px;
        }

        .neumorphic-input::placeholder {
            color: rgba(212, 175, 55, 0.6);
        }

        /* --- BOTÓN 'RELIEVE ORO' --- */
        .btn-gold {
            width: 100%;
            background: var(--gold-gradient);
            border: none;
            color: white;
            padding: 18px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
            transition: all 0.2s ease;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
            margin-top: 10px;
        }

        .btn-gold:active {
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3);
            transform: translateY(1px);
        }

        /* --- ÁREA DE RESULTADO QR --- */
        #resultado {
            margin-top: 30px;
            border-top: 2px solid rgba(212, 175, 55, 0.2);
            padding-top: 20px;
        }

        .qr-frame {
            display: inline-block;
            background-color: var(--bg-color);
            padding: 15px;
            border-radius: 20px;
            box-shadow: var(--shadow-out);
            margin-bottom: 15px;
        }

        #qr-msg {
            color: var(--gold-color);
            font-weight: 600;
            margin-bottom: 15px;
            text-shadow: var(--shadow-gold-text);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

    </style>
</head>
<body>

<div class="neumorphic-card">
    <div class="header-logo">
        <i class="fa-solid fa-shield-halved"></i>
    </div>
    <h1 class="title-gold">Residencial Canteras</h1>
    <p class="subtitle-gold">Sistema de Acceso Inteligente</p>

    <div class="pills-container">
        <button class="pill-button active" onclick="switchTab('invitado')">
            <i class="fa-solid fa-user-clock"></i> Invitado
        </button>
        <button class="pill-button" onclick="switchTab('admin')">
            <i class="fa-solid fa-key"></i> Dueño
        </button>
    </div>

    <div class="tab-content active" id="tab-invitado">
        <label class="form-label">Número de Casa</label>
        <input type="number" id="casaV" class="neumorphic-input" placeholder="Ej: 405">
        <button onclick="generar(false)" class="btn-gold">Generar Pase Único</button>
    </div>

    <div class="tab-content" id="tab-admin">
        <label class="form-label">Casa</label>
        <input type="number" id="casaA" class="neumorphic-input">
        <label class="form-label">Usos</label>
        <input type="number" id="usosA" class="neumorphic-input" value="1">
        <label class="form-label">Tipo</label>
        <select id="tipoA" class="neumorphic-input">
            <option value="Permanente">Permanente</option>
            <option value="Temporal">Temporal</option>
        </select>
        <label class="form-label">PIN</label>
        <input type="password" id="pinA" class="neumorphic-input" placeholder="****">
        <button onclick="generar(true)" class="btn-gold">Generar Maestro</button>
    </div>

    <div id="resultado" style="display: none;">
        <div class="qr-frame">
            <div id="qr-img"></div>
        </div>
        <p id="qr-msg"></p>
        <button onclick="window.print()" class="btn-gold" style="font-size: 14px; padding: 12px; max-width: 200px;">
            <i class="fa-solid fa-print"></i> Guardar
        </button>
    </div>
</div>

<script>
    // Lógica para cambiar de pestaña neumórfica
    function switchTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.pill-button').forEach(el => el.classList.remove('active'));
        
        document.getElementById(`tab-${tabName}`).classList.add('active');
        event.currentTarget.classList.add('active');
        document.getElementById('resultado').style.display = 'none'; // Limpia el QR al cambiar
    }

    // Lógica de generación (mismo principio técnico, nuevo diseño)
    async function generar(isAdmin) {
        const casa = isAdmin ? document.getElementById('casaA').value : document.getElementById('casaV').value;
        const tipo = isAdmin ? document.getElementById('tipoA').value : "Temporal";
        const usos = isAdmin ? document.getElementById('usosA').value : 1;
        const pin = isAdmin ? document.getElementById('pinA').value : "";

        if(!casa) return alert("Por favor, ingresa el número de casa.");
        
        const resDiv = document.getElementById('resultado');
        const imgDiv = document.getElementById('qr-img');
        const msg = document.getElementById('qr-msg');

        resDiv.style.display = 'block';
        imgDiv.innerHTML = '<div style="color:#d4af37">Generando...</div>';

        let url = `/generar?casa=${casa}&tipo=${tipo}&usos=${usos}`;
        if(pin) url += `&pin=${pin}`;

        const img = new Image();
        img.src = url;
        img.style.maxWidth = "200px";
        img.onload = () => {
            imgDiv.innerHTML = "";
            imgDiv.appendChild(img);
            msg.innerText = `Pase generado con éxito`;
        };
        img.onerror = () => {
            imgDiv.innerHTML = '<p style="color:red; font-size:12px">PIN incorrecto o error.</p>';
            msg.innerText = "";
        };
    }
</script>
</body>
</html>
