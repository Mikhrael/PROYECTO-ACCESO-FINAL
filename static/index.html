<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso VIP Canteras | Gestión de Listas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- ESTILOS BASE LUXURY --- */
        :root {
            --bg-dark: #121212;
            --bg-gold-metal: #a68b55;
            --text-gold-light: #f4d081;
            --text-gold-dark: #8c7340;
            --gold-gradient: linear-gradient(135deg, #f4d081 0%, #c29d50 50%, #8c7340 100%);
            --shadow-metal-raised: 8px 8px 16px rgba(0,0,0,0.6), -8px -8px 16px rgba(255,255,255,0.05);
            --shadow-metal-in: inset 3px 3px 6px rgba(0,0,0,0.4), inset -3px -3px 6px rgba(255,255,255,0.05);
            --shadow-gold-text: 1px 1px 3px rgba(0,0,0,0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Inter', sans-serif; background-color: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .luxury-card { background-image: var(--gold-gradient); width: 100%; max-width: 450px; border-radius: 40px; box-shadow: var(--shadow-metal-raised); overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .header-section { background-color: var(--bg-dark); padding: 30px; text-align: center; border-bottom: 2px solid var(--text-gold-dark); }
        .header-logo { color: var(--text-gold-light); font-size: 50px; margin-bottom: 15px; }
        .title-gold-raised { color: var(--text-gold-light); font-size: 22px; text-shadow: var(--shadow-gold-text); }

        .form-section { padding: 30px; }
        .pills-container { display: flex; background-color: rgba(0,0,0,0.1); box-shadow: var(--shadow-metal-in); border-radius: 20px; padding: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .pill-button { flex: 1; background: none; border: none; color: var(--text-gold-dark); padding: 10px; font-weight: 600; cursor: pointer; font-size: 12px; border-radius: 12px; }
        .pill-button.active { color: var(--text-gold-light); background-color: rgba(0,0,0,0.7); border: 1px solid var(--text-gold-dark); }

        .form-label { display: block; color: var(--text-gold-dark); font-weight: 600; font-size: 13px; margin-bottom: 5px; padding-left: 10px; }
        .luxury-input { width: 100%; background-color: transparent; border: 1px solid var(--text-gold-dark); padding: 15px; border-radius: 15px; box-shadow: var(--shadow-metal-in); color: var(--text-gold-light); font-size: 15px; margin-bottom: 15px; }
        .btn-luxury { width: 100%; background-color: #000; border: 2px solid var(--text-gold-dark); color: var(--text-gold-light); padding: 18px; border-radius: 18px; font-weight: 700; cursor: pointer; box-shadow: var(--shadow-metal-raised); transition: 0.3s; }
        .btn-luxury:active { transform: scale(0.98); box-shadow: var(--shadow-metal-in); }

        #resultado { margin-top: 25px; border-top: 2px solid var(--text-gold-dark); padding-top: 20px; text-align: center; }
        .qr-frame { display: inline-block; background: white; padding: 15px; border-radius: 20px; margin-bottom: 15px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<div class="luxury-card">
    <div class="header-section">
        <div class="header-logo"><i class="fa-solid fa-shield-halved"></i></div>
        <h1 class="title-gold-raised">Panel de Control Canteras</h1>
    </div>

    <div class="form-section">
        <div class="pills-container">
            <button class="pill-button active" onclick="switchTab('invitado')">Invitado</button>
            <button class="pill-button" onclick="switchTab('admin')">Residente</button>
            <button class="pill-button" onclick="switchTab('lista-blanca')">Lista Blanca</button>
            <button class="pill-button" onclick="switchTab('lista-negra')">Lista Negra</button>
        </div>

        <div class="tab-content active" id="tab-invitado">
            <label class="form-label">Identificación</label>
            <input type="text" id="casaV" class="luxury-input" placeholder="Visita 101">
            <button onclick="generar('Temporal', 2)" class="btn-luxury">Generar Invitado (2 Usos)</button>
        </div>

        <div class="tab-content" id="tab-admin">
            <label class="form-label">Nombre/Casa</label>
            <input type="text" id="casaA" class="luxury-input" placeholder="Residente 202">
            <label class="form-label">PIN Seguridad</label>
            <input type="password" id="pinA" class="luxury-input" placeholder="****">
            <button onclick="generar('Permanente', 1, 'pinA')" class="btn-luxury">Generar Permanente</button>
        </div>

        <div class="tab-content" id="tab-lista-blanca">
            <p style="color: #000; font-size: 11px; margin-bottom: 10px; font-weight: bold; text-align: center;">Acceso libre con registro de historial.</p>
            <label class="form-label">Nombre a Registrar</label>
            <input type="text" id="casaLB" class="luxury-input" placeholder="Proveedor VIP">
            <label class="form-label">PIN Seguridad</label>
            <input type="password" id="pinLB" class="luxury-input" placeholder="****">
            <button onclick="generar('ListaBlanca', 1, 'pinLB')" class="btn-luxury">Agregar a Lista Blanca</button>
        </div>

        <div class="tab-content" id="tab-lista-negra">
            <p style="color: #600; font-size: 11px; margin-bottom: 10px; font-weight: bold; text-align: center;">Acceso restringido (retraso forzado 15s).</p>
            <label class="form-label">Nombre a Restringir</label>
            <input type="text" id="casaLN" class="luxury-input" placeholder="Nombre Restringido">
            <label class="form-label">PIN Seguridad</label>
            <input type="password" id="pinLN" class="luxury-input" placeholder="****">
            <button onclick="generar('ListaNegra', 1, 'pinLN')" class="btn-luxury">Agregar a Lista Negra</button>
        </div>

        <div id="resultado" style="display: none;">
            <div class="qr-frame"><div id="qr-img"></div></div>
            <p id="qr-msg" style="color:#000; font-weight: bold;"></p>
            <button onclick="location.reload()" class="btn-luxury" style="margin-top:10px; background:#444; border-color: #666;">Nuevo Registro</button>
        </div>
    </div>
</div>

<script>
    function switchTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.pill-button').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${tabName}`).classList.add('active');
        event.currentTarget.classList.add('active');
        document.getElementById('resultado').style.display = 'none';
    }

    async function generar(tipo, usos, pinId = null) {
        let casa = "";
        // Lógica para obtener el valor de identificación según la pestaña
        if(tipo === 'Temporal') casa = document.getElementById('casaV').value;
        if(tipo === 'Permanente') casa = document.getElementById('casaA').value;
        if(tipo === 'ListaBlanca') casa = document.getElementById('casaLB').value;
        if(tipo === 'ListaNegra') casa = document.getElementById('casaLN').value;

        const pin = pinId ? document.getElementById(pinId).value : "";

        // Validaciones básicas
        if(!casa) return alert("Ingrese identificación");
        if(pinId && !pin) return alert("Se requiere el PIN de seguridad para esta acción");

        const resDiv = document.getElementById('resultado');
        const imgDiv = document.getElementById('qr-img');
        resDiv.style.display = 'block';
        imgDiv.innerHTML = "Generando...";

        // Construcción de la URL para el servidor Python
        let url = `/generar?casa=${encodeURIComponent(casa)}&tipo=${tipo}&usos=${usos}`;
        if(pin) url += `&pin=${pin}`;

        const img = new Image();
        img.src = url;
        img.style.maxWidth = "200px";
        img.onload = () => {
            imgDiv.innerHTML = "";
            imgDiv.appendChild(img);
            document.getElementById('qr-msg').innerText = "QR Generado: " + tipo;
            resDiv.scrollIntoView({ behavior: 'smooth' });
        };
        img.onerror = () => {
            resDiv.style.display = 'none';
            alert("Error al generar: Verifique que el PIN sea correcto o que el servidor esté activo.");
        };
    }
</script>
</body>
</html>
